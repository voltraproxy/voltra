<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voltra Proxy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <canvas id="bg"></canvas>
  <div class="blur-orb orb1"></div>
  <div class="blur-orb orb2"></div>
  <div class="noise"></div>

  <nav class="navbar">
    <div class="audio-group">
      <div class="logo" onclick="goHome()">VOLTRA</div>
      <div id="muteBtn">🔊</div>
      <div class="settings-cog" onclick="loadSection('settings')" title="Settings">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.34.07-.68.07-1.08s-.03-.74-.07-1.08l2.32-1.82c.21-.16.27-.46.13-.7l-2.2-3.82c-.13-.24-.42-.32-.66-.24l-2.73 1.1c-.57-.44-1.18-.8-1.86-1.08l-.42-2.9A.54.54 0 0 0 14 2h-4a.54.54 0 0 0-.54.46l-.42 2.9c-.68.28-1.3.64-1.86 1.08L4.45 5.34c-.24-.09-.53 0-.66.24L1.59 9.4c-.14.24-.08.54.13.7l2.32 1.82c-.04.34-.07.69-.07 1.08s.03.74.07 1.08L1.72 15.9c-.21.16-.27.46-.13.7l2.2 3.82c.13.24.42.32.66.24l2.73-1.1c.57.44 1.18.8 1.86 1.08l.42 2.9c.08.46.46.46.54.46h4c.08 0 .46 0 .54-.46l.42-2.9c.68-.28 1.3-.64 1.86-1.08l2.73 1.1c.24.09.53 0 .66-.24l2.2-3.82c.14-.24.08-.54-.13-.7l-2.32-1.82z"/>
        </svg>
      </div>
    </div>

    <div class="nav-links">
      <span data-section="games" onclick="loadSection('games')">Games</span>
      <span data-section="proxies" onclick="loadSection('proxies')">Proxies</span>
      <span data-section="tools" onclick="loadSection('tools')">Tools</span>
      <span data-section="info" onclick="loadSection('info')">Info</span>
    </div>
  </nav>

  <section class="hero" id="heroSection">
    <h1>Play Anything.</h1>
    <p>
      The modern hub for popular unblocked games, powerful browser tools, proxy access, and trending web apps — all inside Voltra. Coming soon.
    </p>
    <div class="hero-search-stack" id="homeSearchStack">
      <div class="hero-search">
        <input
          id="homeSearchInput"
          type="search"
          placeholder="Search page's games, tools, apps, etc."
          aria-label="Search page's games, tools, apps, etc."
          autocomplete="off"
          oninput="handleHomeSearch(this.value)"
          onfocus="handleHomeSearch(this.value)">
      </div>
      <div class="home-search-results" id="homeSearchResults" aria-live="polite"></div>
    </div>
  </section>

  <div id="mainContent" style="position:relative; z-index:2;"></div>

  <footer>
    VOLTRA GAMES — Modern browser gaming experience.
  </footer>

  <div id="introScreen" style="position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column;
  background: radial-gradient(circle at center, rgba(10,14,25,0.95), rgba(0,0,0,0.98));
  backdrop-filter: blur(20px);
  color:white; text-align:center; cursor:pointer;">
    <div style="font-size:3rem; font-weight:800; letter-spacing:0.2em; background:linear-gradient(90deg,rgb(var(--accent-a)),rgb(var(--accent-b))); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
      VOLTRA
    </div>
    <div style="margin-top:12px; opacity:0.7; letter-spacing:0.3em; font-size:0.9rem;">
      CLICK TO ENTER
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
